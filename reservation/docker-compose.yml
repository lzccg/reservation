version: '3.8'

services:
  # ==========================================
  # 1. MySQL 服务
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: reservation-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: reservation
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      # 持久化 MySQL 数据
      - mysql_data:/var/lib/mysql
      # 第一次启动时自动执行 SQL 脚本初始化数据库
      - ./src/main/resources/db/reservation.sql:/docker-entrypoint-initdb.d/reservation.sql
    # 强制设置字符集，防止中文乱码
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ==========================================
  # 2. Redis 服务
  # ==========================================
  redis:
    image: redis:7.0-alpine
    container_name: reservation-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ==========================================
  # 3. 后端服务 (Spring Boot)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reservation-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # 覆盖 application.yaml 中的配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/reservation?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      TZ: Asia/Shanghai
    depends_on:
      - mysql
      - redis

  # ==========================================
  # 4. 前端服务 (Vue3 + Nginx)
  # ==========================================
  frontend:
    build:
      context: ./src/main/resources/frontend
      dockerfile: Dockerfile
    container_name: reservation-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
